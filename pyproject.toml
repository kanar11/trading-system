[project]
name = "trading-system"
version = "0.5.0"
description = "Systematic trading backtester with momentum, mean reversion, breakout, regime detection, risk management, position sizing, trade analytics, walk-forward validation, Monte Carlo robustness, and multi-asset portfolios"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "numpy>=1.24",
    "matplotlib>=3.7",
    "yfinance>=0.2",
    "seaborn>=0.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "mypy>=1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
